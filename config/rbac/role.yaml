# ClusterRole for the llm-operator service account.
#
# Principle of least privilege: the operator only gets the exact verbs it needs.
#
# Resources and rationale:
#   llmproviders / llmworkloads — reconciler reads spec, patches status
#   configmaps                  — workload reconciler writes resolved endpoint
#   secrets                     — provider reconciler reads auth secrets (get only)
#   events                      — controllers emit Kubernetes events
#   leases (coordination.k8s.io)— leader-election (only one replica is active)

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-operator
rules:
  - apiGroups: ["llm.platform.io"]
    resources: ["llmproviders", "llmworkloads"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["llm.platform.io"]
    resources: ["llmproviders/status", "llmworkloads/status"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
