{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "llm-operator.fullname" . }}
  labels:
    {{- include "llm-operator.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    # cert-manager injects the caBundle automatically when this annotation is present.
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/{{ include "llm-operator.fullname" . }}-webhook-cert
  {{- end }}
webhooks:
  - name: llm-operator.llm.platform.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    rules:
      - apiGroups: ["llm.platform.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["llmworkloads"]
        scope: Namespaced
    clientConfig:
      service:
        name: {{ include "llm-operator.fullname" . }}
        namespace: {{ .Values.namespace }}
        path: /validate
        port: 443
      {{- if .Values.webhook.insecureSkipTLSVerify }}
      # insecureSkipTLSVerify is set — suitable for local/dev clusters where TLS
      # certs are not provisioned. Do NOT use this in production.
      insecureSkipTLSVerify: true
      {{- else if not .Values.webhook.certManager.enabled }}
      # cert-manager is disabled; set caBundle to the base64-encoded CA cert,
      # or apply config/tls/certificate.yaml with a cert-manager ClusterIssuer.
      caBundle: ""
      {{- end }}
    # Exclude system namespaces and the operator's own namespace from validation.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - {{ .Values.namespace }}
{{- end }}
