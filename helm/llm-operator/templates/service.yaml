apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-operator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "llm-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    - name: webhook
      port: 443
      targetPort: webhook
      protocol: TCP
