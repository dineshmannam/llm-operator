apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-operator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llm-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "llm-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: LLM_MAX_BUDGET
              value: {{ .Values.operator.maxBudgetPerHour | quote }}
            - name: RUST_LOG
              value: {{ printf "llm_operator=%s" .Values.operator.logLevel | quote }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: webhook
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: webhook-tls
              mountPath: /tls
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-tls
          secret:
            secretName: {{ .Values.webhook.tlsSecretName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
